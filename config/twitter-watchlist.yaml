selection_rules:
  promote_candidate_to_core:
    - "Produces first-hand or high-utility posts at least twice per week over a 2-4 week window"
    - "Consistently yields content useful for AI creator briefs, not just reposted news"
    - "Adds unique angle: builder, tutorial, founder, official, or AIGC workflow"
  demote_core_to_candidate:
    - "Becomes mostly reposts, memes, or low-information commentary"
    - "Stops posting useful AI content for a sustained period"
    - "Overlaps too heavily with stronger accounts in the same category"

notes:
  - "This file is an initial seed list, not a final production-grade universe."
  - "For v1, prefer stable watchlist fetches over dynamic following-page discovery."
  - "Add source-specific fetch configs later, after validating which accounts actually produce signal."
